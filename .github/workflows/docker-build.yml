name: Build and Push Docker Image

on:
  workflow_dispatch:  # Manual trigger only - you click "Run workflow" in GitHub Actions tab
  # Uncomment below to auto-build on push to main:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'Dockerfile'
  #     - 'docker-entrypoint.sh'
  #     - 'requirements.lock.txt'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/graalvm /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
